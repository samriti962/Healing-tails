<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #E8F0E6;
  color: #344E41;
}

/* TOP BAR */
.topbar {
  background: #A3B18A;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
}

.back-btn {
  background: #344E41;
  border: none;
  padding: 8px 16px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
}

/* MAIN CONTAINER */
.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 0 15px;
}

/* CARD */
.card {
  background: #F6F6F6;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.card h3 {
  margin-bottom: 5px;
}

.desc {
  font-size: 13px;
  color: #6c7a6f;
  margin-bottom: 15px;
}

/* ITEMS */
.setting-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 12px 0;
  gap: 10px;
}

/* BUTTON */
.btn {
  padding: 8px 15px;
  border: none;
  border-radius: 10px;
  background: #344E41;
  color: white;
  cursor: pointer;
}

.danger {
  background: #e74c3c;
}

/* INPUT */
input, textarea {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* TOGGLE */
.toggle {
  width: 42px;
  height: 22px;
  background: #ccc;
  border-radius: 20px;
  position: relative;
  cursor: pointer;
}

.toggle::before {
  content: "";
  width: 18px;
  height: 18px;
  background: white;
  position: absolute;
  top: 2px;
  left: 2px;
  border-radius: 50%;
  transition: 0.3s;
}

.toggle.active {
  background: #344E41;
}

.toggle.active::before {
  left: 22px;
}

/* BLOCK LIST */
.user-row {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <h2>🌿 Healing Tails</h2>
  <button class="back-btn" onclick="goBack()">← Back</button>
</div>

<div class="container">

<!-- PROFILE -->
<div class="card">
  <h3>👤 Profile</h3>
  <p class="desc">Manage your anonymous identity</p>

  <div class="setting-item">
    <span>Anonymous Name</span>
    <strong id="username">Calm_472</strong>
  </div>

  <button class="btn" onclick="changeName()">Change Name</button>
</div>

<!-- PRIVACY -->
<div class="card">
  <h3>🔒 Privacy</h3>
  <p class="desc">Control your privacy</p>

  <div class="setting-item">
    <span>Keep anonymous</span>
    <div class="toggle active" onclick="toggleSwitch(this)"></div>
  </div>

  <div class="setting-item">
    <span>Allow sensitive content</span>
    <div class="toggle" onclick="toggleSwitch(this)"></div>
  </div>
</div>

<!-- NOTIFICATIONS -->
<div class="card">
  <h3>🔔 Notifications</h3>
  <p class="desc">Manage alerts</p>

  <div class="setting-item">
    <span>Enable Notifications</span>
    <div class="toggle" onclick="toggleSwitch(this)"></div>
  </div>

  <div class="setting-item">
    <span>Daily Reminder</span>
    <div class="toggle" onclick="toggleSwitch(this)"></div>
  </div>
</div>

<!-- BLOCK USERS -->
<div class="card">
  <h3>🚫 Block Users</h3>

  <div class="setting-item">
    <input type="text" id="blockInput" placeholder="Enter username..." />
    <button class="btn" onclick="blockUser()">Block</button>
  </div>

  <div id="blockedList"></div>
</div>

<!-- REPORT -->
<div class="card">
  <h3>⚠️ Report</h3>

  <textarea id="reportInput" placeholder="Describe issue..."></textarea>
  <br><br>
  <button class="btn danger" onclick="reportUser()">Report</button>
</div>

<!-- ACCOUNT -->
<div class="card">
  <h3>🚪 Account</h3>

  <button class="btn danger" onclick="logout()">Logout</button>
</div>

</div>

<script>
// BACK
function goBack() {
  window.history.back();
}

// LOAD
window.onload = function () {
  let name = localStorage.getItem("username");
  if (name) document.getElementById("username").innerText = name;

  let blocked = JSON.parse(localStorage.getItem("blockedUsers")) || [];
  blocked.forEach(addToList);
};

// TOGGLE
function toggleSwitch(el) {
  el.classList.toggle("active");
}

// NAME
function changeName() {
  let name = prompt("Enter new name:");
  if (name) {
    document.getElementById("username").innerText = name;
    localStorage.setItem("username", name);
  }
}

// BLOCK
function blockUser() {
  let input = document.getElementById("blockInput");
  let user = input.value.trim();

  if (!user) return alert("Enter username");

  let blocked = JSON.parse(localStorage.getItem("blockedUsers")) || [];

  if (!blocked.includes(user)) {
    blocked.push(user);
    localStorage.setItem("blockedUsers", JSON.stringify(blocked));
    addToList(user);
    input.value = "";
  }
}

// ADD LIST
function addToList(user) {
  let div = document.createElement("div");
  div.className = "user-row";
  div.innerHTML = `
    <span>${user}</span>
    <button onclick="this.parentElement.remove()">Remove</button>
  `;
  document.getElementById("blockedList").appendChild(div);
}

// REPORT
function reportUser() {
  let text = document.getElementById("reportInput").value;
  if (!text) return alert("Write something");
  alert("Reported ✅");
  document.getElementById("reportInput").value = "";
}

// LOGOUT
function logout() {
  alert("Logged out");
}
</script>

</body>
</html>
