<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spaces - Healing Tales</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🌿 Healing Tales</h2>

    <ul>
      <li id="nav-feed" onclick="go('feed.html')">🏠 Feed</li>
      <li id="nav-spaces" onclick="go('spaces.html')">👥 Community</li>
      <li id="nav-dashboard" onclick="go('index.html')">📊 Dashboard</li>
      <li id="nav-profile" onclick="go('profile.html')">👤 Profile</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">

    <div class="welcome">
      <h2>👥 Spaces</h2>
      <p>Join or create a safe community</p>
    </div>

    <!-- Create Space -->
    <div class="card">
      <h3>Create Space</h3>

      <input id="spaceName" placeholder="Space name">
      <input id="spaceDesc" placeholder="Description">

      <button onclick="createSpace()">Create</button>
    </div>

    <!-- Spaces List -->
    <div id="spaces"></div>

  </div>

</div>

<!-- 🔐 AUTH CHECK -->
<script>
if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}
</script>

<!-- 🔗 NAVIGATION -->
<script>
function go(page) {
  window.location.href = page;
}
</script>

<!-- 🎯 ACTIVE NAV -->
<script>
const path = window.location.pathname;

if (path.includes("feed")) {
  document.getElementById("nav-feed")?.classList.add("active");
}
if (path.includes("spaces")) {
  document.getElementById("nav-spaces")?.classList.add("active");
}
if (path.includes("index")) {
  document.getElementById("nav-dashboard")?.classList.add("active");
}
if (path.includes("profile")) {
  document.getElementById("nav-profile")?.classList.add("active");
}
</script>

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/spaces.js"></script>

</body>
</html>
