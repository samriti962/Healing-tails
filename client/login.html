<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Healing Tails - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">

  <!-- LEFT SIDE (Emotional Section) -->
  <div class="auth-left">
    <h1>🌿 Healing Begins Here</h1>
    <p>
      A safe space where you can share, reflect, and grow —  
      anonymously, peacefully, and without judgment.
    </p>
  </div>

  <!-- RIGHT SIDE (Form) -->
  <div class="auth-right">

    <div class="auth-card">
      <h2 id="title">Welcome Back</h2>
      <p class="subtitle">Take a breath. You’re safe here.</p>

      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">

      <button onclick="handleAuth()">Continue</button>

      <p class="switch" onclick="switchMode()">
        Don’t have an account? Register
      </p>
    </div>

  </div>

</div>

<script>
let isLogin = true;

function switchMode() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = 
    isLogin ? "Welcome Back" : "Create Your Space";

  document.querySelector(".switch").innerText = 
    isLogin ? "Don’t have an account? Register" : "Already have an account? Login";
}

function handleAuth() {
  alert(isLogin ? "Logged in successfully 💚" : "Registered successfully 🌿");
}
</script>

</body>
</html>
